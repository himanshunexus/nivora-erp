services:
  - type: web
    name: nivora-erp
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nivora-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nivora-redis
          property: connectionString

  - type: postgres
    name: nivora-db
    plan: free
    postgresSQLVersion: 15

  - type: redis
    name: nivora-redis
    plan: free
    ipWhitelist: []
