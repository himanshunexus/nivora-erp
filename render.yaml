services:

* type: web
  name: nivora-erp
  runtime: python
  buildCommand: pip install -r requirements.txt
  startCommand: gunicorn config.wsgi

  preDeployCommand: python manage.py migrate && python manage.py collectstatic --noinput

  envVars:

  * key: PYTHON_VERSION
    value: 3.9
  * key: DJANGO_DEBUG
    value: "False"
  * key: DJANGO_SECRET_KEY
    sync: false
  * key: DJANGO_ALLOWED_HOSTS
    value: "*"
  * key: DATABASE_URL
    fromDatabase:
    name: nivora-db
    property: connectionString
  * key: REDIS_URL
    fromService:
    name: nivora-redis
    property: connectionString

* type: postgres
  name: nivora-db
  plan: free
  postgresMajorVersion: 15

* type: redis
  name: nivora-redis
  plan: free
  ipAllowList: []
